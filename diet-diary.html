<style>
:root{
  --bg:#f7f5f0;--white:#fff;--border:#ece9e2;
  --text:#1a1814;--muted:#9e9a92;
  --carb:#f4845f;--prot:#5b8dee;--fat:#f59e0b;
  --green:#22c55e;--danger:#ef4444;
  --radius:18px;--shadow:0 2px 16px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:90px;overflow-x:hidden}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 20px;z-index:100;box-shadow:0 -2px 20px rgba(0,0,0,.06)}
.nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-family:inherit;font-size:10px;padding:4px 20px;transition:color .2s}
.nav-btn.active{color:var(--text)}
.nav-icon{font-size:22px;line-height:1}

.page{display:none;max-width:480px;margin:0 auto;padding:0 16px}
.page.active{display:block}

.page-header{display:flex;justify-content:space-between;align-items:center;padding:52px 0 18px}
.page-title{font-family:'DM Serif Display',serif;font-size:26px;letter-spacing:-.5px}
.date-nav{display:flex;align-items:center;gap:6px;background:var(--white);border:1px solid var(--border);border-radius:24px;padding:6px 14px;box-shadow:var(--shadow)}
.date-nav button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0;transition:color .2s;line-height:1}
#date-display{font-size:13px;min-width:88px;text-align:center;font-weight:500;cursor:pointer;user-select:none}
#date-display:active{opacity:.7}

#home-swipe{will-change:transform}
.swipe-out-left{animation:swipeOutL .2s ease forwards}
.swipe-out-right{animation:swipeOutR .2s ease forwards}
.enter-from-right{animation:enterR .22s ease forwards}
.enter-from-left{animation:enterL .22s ease forwards}
@keyframes swipeOutL{to{transform:translateX(-36px);opacity:0}}
@keyframes swipeOutR{to{transform:translateX(36px);opacity:0}}
@keyframes enterR{from{transform:translateX(36px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes enterL{from{transform:translateX(-36px);opacity:0}to{transform:translateX(0);opacity:1}}

/* 칼로리 요약 */
.summary-card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:14px}
.cal-top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.cal-side{text-align:center;min-width:80px}
.cal-side-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.cal-side-num{font-family:'DM Serif Display',serif;font-size:36px;line-height:1;letter-spacing:-1px}
.cal-side-num span{font-size:13px;font-family:inherit;color:var(--muted);margin-left:1px}
.cal-bar-wrap{background:#f0ede8;border-radius:8px;height:8px;overflow:hidden;margin-bottom:20px}
.cal-bar-fill{height:100%;border-radius:8px;max-width:100%;background:linear-gradient(90deg,#4ade80,#22c55e);transition:width .5s ease}
.cal-bar-fill.over{background:linear-gradient(90deg,#f87171,var(--danger))}
.macro-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.macro-item{display:flex;flex-direction:column;align-items:center}
.macro-label{font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;margin-bottom:6px;justify-content:center}
.macro-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.macro-bar-wrap{background:#f0ede8;border-radius:6px;height:6px;overflow:hidden;margin-bottom:4px;width:100%}
.macro-bar-fill{height:100%;border-radius:6px;transition:width .4s ease;max-width:100%}
.macro-nums{font-size:11px;color:var(--muted);text-align:center}
.macro-nums b{color:var(--text);font-weight:600}

/* 식단 카드 */
.food-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:14px;cursor:pointer;transition:opacity .15s}
.food-card:active{opacity:.85}
.food-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.food-card-title{font-size:15px;font-weight:700}
.food-card-add{color:var(--prot);font-size:13px;font-weight:600}
.food-list{display:flex;flex-direction:column}
.food-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);animation:slideIn .22s ease}
.food-item:last-child{border-bottom:none}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.food-name{font-size:14px;font-weight:500;margin-bottom:3px}
.food-macros{font-size:11px;color:var(--muted);display:flex;gap:6px}
.food-macros .c{color:var(--carb);font-weight:600}
.food-macros .p{color:var(--prot);font-weight:600}
.food-macros .f{color:var(--fat);font-weight:600}
.food-right{display:flex;align-items:center;gap:10px}
.food-cal{font-size:16px;font-weight:700;text-align:right}
.food-cal span{display:block;font-size:11px;font-weight:400;color:var(--muted)}
.del-btn{background:none;border:none;cursor:pointer;color:#d0ccc6;font-size:20px;line-height:1;transition:color .2s;padding:2px}
.del-btn:hover{color:var(--danger)}
.empty-food{text-align:center;padding:24px 0;color:var(--muted);font-size:13px}
.empty-food .emoji{font-size:28px;margin-bottom:6px}

/* 체중 카드 */
.weight-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:14px}
.weight-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.weight-card-title{font-size:15px;font-weight:700}
.weight-chart-toggle{background:none;border:none;color:var(--prot);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0}
.weight-body{display:flex;flex-direction:column;align-items:center;gap:6px}
.weight-goal-text{font-size:12px;color:var(--muted)}
.weight-controls{display:flex;align-items:center;gap:20px;margin-top:4px}
.weight-ctrl-btn{background:none;border:2px solid var(--border);border-radius:50%;width:36px;height:36px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);transition:all .15s;flex-shrink:0;font-family:inherit}
.weight-ctrl-btn:active{background:var(--bg);transform:scale(.92)}
.weight-val{font-family:'DM Serif Display',serif;font-size:42px;line-height:1;letter-spacing:-1px;min-width:120px;text-align:center}
.weight-val span{font-size:16px;font-family:inherit;color:var(--muted);margin-left:2px;font-weight:400}
.weight-diff{font-size:12px;font-weight:600;text-align:center;min-height:16px}
.weight-chart-section{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;display:none}
.weight-chart-section.open{display:block}
.period-tabs{display:flex;gap:4px}
.period-tab{background:none;border:1.5px solid var(--border);border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .2s}
.period-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.weight-log{margin-top:14px;display:flex;flex-direction:column}
.weight-entry{display:flex;justify-content:space-between;align-items:center;padding:10px 2px;border-bottom:1px solid var(--border)}
.weight-entry:last-child{border-bottom:none}
.w-date{font-size:13px;color:var(--muted)}
.w-val{font-size:16px;font-weight:700}
.w-diff{font-size:12px;margin-left:6px}
.w-diff.up{color:var(--danger)}
.w-diff.down{color:var(--green)}
.w-right{display:flex;align-items:center;gap:10px}
.w-del{background:none;border:none;color:#d0ccc6;cursor:pointer;font-size:16px;transition:color .2s}
.w-del:hover{color:var(--danger)}
.empty-chart{height:80px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px}

/* 캘린더 모달 */
.cal-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;align-items:flex-end;justify-content:center}
.cal-modal-overlay.open{display:flex}
.cal-modal{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:0 20px 40px;animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}
.cal-handle{width:38px;height:4px;background:#e0ddd7;border-radius:2px;margin:14px auto 16px}
.cal-modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.cal-modal-title{font-size:16px;font-weight:700}
.cal-month-nav{display:flex;align-items:center;gap:12px}
.cal-month-nav button{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1}
#cal-month-label{font-size:14px;font-weight:600;min-width:72px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:4px 0 8px;font-weight:600}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:50%;cursor:pointer;transition:background .15s;position:relative}
.cal-day:hover{background:var(--bg)}
.cal-day.today{font-weight:700;color:var(--prot)}
.cal-day.selected{background:var(--text);color:#fff!important}
.cal-day.has-data::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--green)}
.cal-day.selected::after{background:#fff}
.cal-day.empty{cursor:default;pointer-events:none}

/* ── 음식 추가 모달 (야지오 스타일) ── */
.food-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:flex-end;justify-content:center}
.food-modal-overlay.open{display:flex}
.food-modal{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:480px;height:88vh;display:flex;flex-direction:column;animation:slideUp .28s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.food-modal-handle{width:38px;height:4px;background:#e0ddd7;border-radius:2px;margin:14px auto 0;flex-shrink:0}
.food-modal-top{padding:14px 18px 0;flex-shrink:0}
.food-modal-title{font-size:17px;font-weight:700;margin-bottom:12px}

/* 검색창 */
.food-search-wrap{position:relative;margin-bottom:14px}
.food-search-input{width:100%;background:#f0ede8;border:2px solid transparent;border-radius:12px;padding:11px 16px 11px 40px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
.food-search-input:focus{border-color:var(--prot);background:var(--white)}
.food-search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}

/* 탭 */
.food-tabs{display:flex;background:#f0ede8;border-radius:10px;padding:3px;margin-bottom:0;flex-shrink:0}
.food-tab{flex:1;padding:7px 0;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;color:var(--muted);transition:all .2s}
.food-tab.active{background:var(--white);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* 음식 목록 */
.food-db-list{flex:1;overflow-y:auto;padding:0 18px 8px}
.food-db-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.food-db-item:last-child{border-bottom:none}
.food-db-name{font-size:15px;font-weight:500;margin-bottom:2px}
.food-db-sub{font-size:12px;color:var(--muted)}
.food-db-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.food-db-cal{font-size:14px;font-weight:600;color:var(--muted)}
.food-db-add{background:none;border:2px solid var(--prot);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--prot);font-size:16px;line-height:1;transition:all .15s;flex-shrink:0}
.food-db-add:active{background:var(--prot);color:#fff;transform:scale(.92)}
.food-db-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.food-db-empty .emoji{font-size:32px;margin-bottom:8px}

/* 새 음식 추가 폼 */
.new-food-form{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;background:var(--white)}
.new-food-toggle{width:100%;background:none;border:1.5px solid var(--border);border-radius:10px;padding:11px;font-size:14px;font-weight:600;color:var(--muted);font-family:inherit;cursor:pointer;transition:all .2s}
.new-food-toggle:hover{border-color:var(--text);color:var(--text)}
.new-food-fields{display:none;margin-top:12px;display:flex;flex-direction:column;gap:8px}
.new-food-fields.open{display:flex}
.new-food-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
input[type=text],input[type=number]{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none}
input:focus{border-color:var(--text)}
.new-food-submit{width:100%;background:var(--text);color:var(--white);border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.new-food-submit:hover{opacity:.85}

/* 설정 */
.settings-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
.card-label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:12px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.setting-row:last-of-type{border-bottom:none}
.setting-label{font-size:15px}
.setting-input{width:100px;text-align:right;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:15px;font-family:inherit;color:var(--text);outline:none;transition:border-color .2s}
.setting-input:focus{border-color:var(--text)}
.macro-preview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0 16px}
.macro-prev-item{background:var(--bg);border-radius:10px;padding:12px;text-align:center}
.macro-prev-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.macro-prev-val{font-size:17px;font-weight:700}
.save-btn{width:100%;background:var(--text);color:var(--white);border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.save-btn:hover{opacity:.85}
.backup-row{display:flex;gap:8px;margin-bottom:10px}
.backup-btn{flex:1;border:1.5px solid var(--border);background:var(--white);color:var(--text);border-radius:12px;padding:13px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.backup-btn:hover{background:var(--bg)}
.backup-btn.danger{border-color:#fca5a5;color:var(--danger)}
.backup-btn.danger:hover{background:#fff5f5}

.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#1a1814;color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:400;white-space:nowrap;font-weight:500}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="page-header">
    <div class="page-title">요약</div>
    <div class="date-nav">
      <button onclick="changeDate(-1)">‹</button>
      <span id="date-display" onclick="openCalendar()">오늘</span>
      <button onclick="changeDate(1)">›</button>
    </div>
  </div>
  <div id="home-swipe">

    <!-- 칼로리 요약 카드 -->
    <div class="summary-card">
      <div class="cal-top-row">
        <div class="cal-side">
          <div class="cal-side-label">섭취량</div>
          <div class="cal-side-num" id="cal-consumed">0<span>kcal</span></div>
        </div>
        <div class="cal-side">
          <div class="cal-side-label">잔여 칼로리</div>
          <div class="cal-side-num" id="cal-remain">0<span>kcal</span></div>
        </div>
      </div>
      <div class="cal-bar-wrap"><div class="cal-bar-fill" id="cal-bar" style="width:0%"></div></div>
      <div class="macro-grid">
        <div class="macro-item">
          <div class="macro-label"><div class="macro-dot" style="background:var(--carb)"></div>탄수화물</div>
          <div class="macro-bar-wrap"><div class="macro-bar-fill" id="carb-bar" style="width:0%;background:var(--carb)"></div></div>
          <div class="macro-nums"><b id="carb-eaten">0</b> / <span id="carb-goal">250</span>g</div>
        </div>
        <div class="macro-item">
          <div class="macro-label"><div class="macro-dot" style="background:var(--prot)"></div>단백질</div>
          <div class="macro-bar-wrap"><div class="macro-bar-fill" id="prot-bar" style="width:0%;background:var(--prot)"></div></div>
          <div class="macro-nums"><b id="prot-eaten">0</b> / <span id="prot-goal">150</span>g</div>
        </div>
        <div class="macro-item">
          <div class="macro-label"><div class="macro-dot" style="background:var(--fat)"></div>지방</div>
          <div class="macro-bar-wrap"><div class="macro-bar-fill" id="fat-bar" style="width:0%;background:var(--fat)"></div></div>
          <div class="macro-nums"><b id="fat-eaten">0</b> / <span id="fat-goal">44</span>g</div>
        </div>
      </div>
    </div>

    <!-- 식단 카드 -->
    <div class="food-card" onclick="openFoodModal()">
      <div class="food-card-header">
        <div class="food-card-title">식단</div>
        <div class="food-card-add">＋ 추가</div>
      </div>
      <div class="food-list" id="food-list">
        <div class="empty-food"><div class="emoji">🍽️</div><p>탭해서 음식을 추가해보세요</p></div>
      </div>
    </div>

    <!-- 체중 카드 -->
    <div class="weight-card">
      <div class="weight-card-header">
        <div class="weight-card-title">체중</div>
        <button class="weight-chart-toggle" onclick="toggleWeightChart(event)">그래프 보기 ▾</button>
      </div>
      <div class="weight-body">
        <div class="weight-goal-text" id="weight-goal-text">목표: --kg</div>
        <div class="weight-controls">
          <button class="weight-ctrl-btn" onclick="adjustWeight(-0.1)">−</button>
          <div>
            <div class="weight-val" id="weight-val">--<span>kg</span></div>
            <div class="weight-diff" id="weight-diff"></div>
          </div>
          <button class="weight-ctrl-btn" onclick="adjustWeight(0.1)">+</button>
        </div>
      </div>
      <div class="weight-chart-section" id="weight-chart-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;margin-top:14px">
          <span style="font-size:13px;font-weight:600">체중 변화</span>
          <div class="period-tabs">
            <button class="period-tab active" id="tab-week" onclick="setPeriod('week')">주간</button>
            <button class="period-tab" id="tab-month" onclick="setPeriod('month')">월간</button>
          </div>
        </div>
        <div id="weight-chart-wrap"></div>
        <div class="weight-log" id="weight-log"></div>
      </div>
    </div>

  </div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="page-header"><div class="page-title">설정</div></div>
  <div class="settings-card">
    <div class="card-label" style="margin-bottom:0">목표 설정</div>
    <div class="setting-row">
      <div class="setting-label">하루 목표 칼로리</div>
      <input type="number" class="setting-input" id="setting-cal" placeholder="2000" min="500" max="5000" oninput="updateMacroPreview()">
    </div>
    <div class="setting-row" style="border-bottom:none">
      <div class="setting-label">목표 체중 (kg)</div>
      <input type="number" class="setting-input" id="setting-weight" placeholder="60" step="0.1">
    </div>
  </div>
  <div class="settings-card">
    <div class="card-label" style="margin-bottom:10px">탄단지 자동 계산 (탄 50% / 단 30% / 지 20%)</div>
    <div class="macro-preview">
      <div class="macro-prev-item"><div class="macro-prev-label" style="color:var(--carb)">탄수화물</div><div class="macro-prev-val" id="prev-carb">250g</div></div>
      <div class="macro-prev-item"><div class="macro-prev-label" style="color:var(--prot)">단백질</div><div class="macro-prev-val" id="prev-prot">150g</div></div>
      <div class="macro-prev-item"><div class="macro-prev-label" style="color:var(--fat)">지방</div><div class="macro-prev-val" id="prev-fat">44g</div></div>
    </div>
    <button class="save-btn" onclick="saveSettings()">저장</button>
  </div>
  <div class="settings-card">
    <div class="card-label" style="margin-bottom:8px">데이터 백업 / 복원</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">모든 데이터를 JSON 파일로 내보내거나, 백업 파일을 불러올 수 있어요.</div>
    <div class="backup-row">
      <button class="backup-btn" onclick="exportData()">📤 내보내기</button>
      <button class="backup-btn" onclick="document.getElementById('import-file').click()">📥 가져오기</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="backup-btn danger" style="width:100%" onclick="resetAllData()">🗑️ 모든 데이터 초기화</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showPage('home')"><div class="nav-icon">🥗</div><span>식단</span></button>
  <button class="nav-btn" id="nav-settings" onclick="showPage('settings')"><div class="nav-icon">⚙️</div><span>설정</span></button>
</nav>

<!-- 캘린더 모달 -->
<div class="cal-modal-overlay" id="cal-overlay" onclick="handleCalOverlay(event)">
  <div class="cal-modal">
    <div class="cal-handle"></div>
    <div class="cal-modal-header">
      <div class="cal-modal-title">날짜 선택</div>
      <div class="cal-month-nav">
        <button onclick="calChangeMonth(-1)">‹</button>
        <span id="cal-month-label"></span>
        <button onclick="calChangeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- 음식 추가 모달 (야지오 스타일) -->
<div class="food-modal-overlay" id="food-modal-overlay" onclick="handleFoodModalOverlay(event)">
  <div class="food-modal">
    <div class="food-modal-handle"></div>
    <div class="food-modal-top">
      <div class="food-modal-title">식단 추가</div>
      <!-- 검색창 -->
      <div class="food-search-wrap">
        <span class="food-search-icon">🔍</span>
        <input type="text" class="food-search-input" id="food-search" placeholder="음식 이름으로 검색..." oninput="onFoodSearch()" autocomplete="off">
      </div>
      <!-- 탭 -->
      <div class="food-tabs" id="food-tabs-bar">
        <button class="food-tab active" id="tab-frequent" onclick="switchFoodTab('frequent')">자주 사용</button>
        <button class="food-tab" id="tab-recent" onclick="switchFoodTab('recent')">최근</button>
      </div>
    </div>
    <!-- 목록 -->
    <div class="food-db-list" id="food-db-list"></div>
    <!-- 새 음식 추가 -->
    <div class="new-food-form">
      <button class="new-food-toggle" onclick="toggleNewFoodForm()">＋ 새 음식 직접 입력</button>
      <div class="new-food-fields" id="new-food-fields">
        <input type="text" id="nf-name" placeholder="음식 이름">
        <input type="number" id="nf-cal" placeholder="칼로리 (kcal)" min="0" max="9999">
        <div class="new-food-row">
          <input type="number" id="nf-carb" placeholder="탄수화물g" min="0" max="999" step="0.1">
          <input type="number" id="nf-prot" placeholder="단백질g" min="0" max="999" step="0.1">
          <input type="number" id="nf-fat" placeholder="지방g" min="0" max="999" step="0.1">
        </div>
        <button class="new-food-submit" onclick="addNewFood()">추가하기</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentDate = todayStr();
let chartPeriod = 'week';
let calViewYear, calViewMonth;
let foodTabMode = 'frequent'; // 'frequent' | 'recent' | 'search'
let newFoodFormOpen = false;

function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}

function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
function ss(k,v){localStorage.setItem(k,JSON.stringify(v))}
const getSettings  = () => ls('cfg',{goalCal:2000,goalWeight:null});
const getFoodLog   = d  => ls(`food_${d}`,[]);
const saveFoodLog  = (d,a) => ss(`food_${d}`,a);
const getWeightLog = () => ls('weight',[]);
const saveWeightLog= a  => ss('weight',a);
const getFoodDB    = () => ls('fooddb',[]);
const saveFoodDB   = a  => ss('fooddb',a);

function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  if(name==='settings') renderSettingsPage();
}

// SWIPE
let tx=0,ty=0,tActive=false;
const homeEl=document.getElementById('page-home');
homeEl.addEventListener('touchstart',e=>{
  if(document.getElementById('food-modal-overlay').classList.contains('open'))return;
  if(document.getElementById('cal-overlay').classList.contains('open'))return;
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;tActive=true;
},{passive:true});
homeEl.addEventListener('touchend',e=>{
  if(!tActive)return;tActive=false;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx)*0.75)return;
  doSwipe(dx<0?'left':'right');
},{passive:true});

function doSwipe(dir){
  const wrap=document.getElementById('home-swipe');
  const outCls=dir==='left'?'swipe-out-left':'swipe-out-right';
  const inCls=dir==='left'?'enter-from-right':'enter-from-left';
  wrap.classList.add(outCls);
  setTimeout(()=>{
    wrap.classList.remove(outCls);
    shiftDate(dir==='left'?1:-1);
    wrap.classList.add(inCls);
    setTimeout(()=>wrap.classList.remove(inCls),250);
  },200);
}

function changeDate(delta){doSwipe(delta>0?'left':'right');}
function shiftDate(delta){
  const d=new Date(currentDate+'T00:00:00');
  d.setDate(d.getDate()+delta);
  currentDate=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  renderHome();
}
function renderDateLabel(){
  const d=new Date(currentDate+'T00:00:00');
  const today=todayStr();
  const dow=['일','월','화','수','목','금','토'][d.getDay()];
  let label=`${d.getMonth()+1}/${d.getDate()} (${dow})`;
  if(currentDate===today)label='오늘';
  else{const diff=Math.round((new Date(currentDate)-new Date(today))/86400000);if(diff===-1)label='어제';}
  document.getElementById('date-display').textContent=label;
}

// 캘린더
function openCalendar(){
  const d=new Date(currentDate+'T00:00:00');
  calViewYear=d.getFullYear();calViewMonth=d.getMonth();
  renderCalendar();
  document.getElementById('cal-overlay').classList.add('open');
}
function handleCalOverlay(e){if(e.target===document.getElementById('cal-overlay'))closeCalendar();}
function closeCalendar(){document.getElementById('cal-overlay').classList.remove('open');}
function calChangeMonth(delta){
  calViewMonth+=delta;
  if(calViewMonth<0){calViewMonth=11;calViewYear--;}
  if(calViewMonth>11){calViewMonth=0;calViewYear++;}
  renderCalendar();
}
function renderCalendar(){
  document.getElementById('cal-month-label').textContent=`${calViewYear}.${pad(calViewMonth+1)}`;
  const grid=document.getElementById('cal-grid');
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const firstDay=new Date(calViewYear,calViewMonth,1).getDay();
  const lastDate=new Date(calViewYear,calViewMonth+1,0).getDate();
  const today=todayStr();
  for(let i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
  for(let d=1;d<=lastDate;d++){
    const ds=`${calViewYear}-${pad(calViewMonth+1)}-${pad(d)}`;
    let cls='cal-day';
    if(ds===today)cls+=' today';
    if(ds===currentDate)cls+=' selected';
    if(getFoodLog(ds).length>0)cls+=' has-data';
    html+=`<div class="${cls}" onclick="selectCalDate('${ds}')">${d}</div>`;
  }
  grid.innerHTML=html;
}
function selectCalDate(ds){
  currentDate=ds;closeCalendar();
  const wrap=document.getElementById('home-swipe');
  wrap.classList.add('enter-from-right');
  renderHome();
  setTimeout(()=>wrap.classList.remove('enter-from-right'),250);
}

// HOME RENDER
function renderHome(){
  renderDateLabel();
  const cfg=getSettings();
  const goalCal=cfg.goalCal||2000;
  const goalCarb=Math.round(goalCal*0.50/4);
  const goalProt=Math.round(goalCal*0.30/4);
  const goalFat =Math.round(goalCal*0.20/9);
  const foods=getFoodLog(currentDate);
  let tCal=0,tCarb=0,tProt=0,tFat=0;
  foods.forEach(f=>{tCal+=f.cal||0;tCarb+=f.carb||0;tProt+=f.prot||0;tFat+=f.fat||0;});

  document.getElementById('cal-consumed').innerHTML=`${tCal}<span>kcal</span>`;
  const remain=goalCal-tCal;
  const remainEl=document.getElementById('cal-remain');
  if(remain>=0){remainEl.innerHTML=`${remain}<span>kcal</span>`;remainEl.style.color='';}
  else{remainEl.innerHTML=`${Math.abs(remain)}<span>kcal 초과</span>`;remainEl.style.color='var(--danger)';}

  const pct=Math.min(100,Math.round(tCal/goalCal*100));
  const bar=document.getElementById('cal-bar');
  bar.style.width=pct+'%';
  bar.className='cal-bar-fill'+(tCal>goalCal?' over':'');

  setMacro('carb',tCarb,goalCarb);
  setMacro('prot',tProt,goalProt);
  setMacro('fat', tFat, goalFat);

  const listEl=document.getElementById('food-list');
  if(!foods.length){
    listEl.innerHTML='<div class="empty-food"><div class="emoji">🍽️</div><p>탭해서 음식을 추가해보세요</p></div>';
  } else {
    listEl.innerHTML='';
    foods.forEach((f,i)=>{
      const el=document.createElement('div');
      el.className='food-item';
      el.onclick=e=>e.stopPropagation();
      const mc=[
        f.carb!=null?`<span class="c">탄 ${f.carb}g</span>`:'',
        f.prot!=null?`<span class="p">단 ${f.prot}g</span>`:'',
        f.fat !=null?`<span class="f">지 ${f.fat}g</span>` :'',
      ].filter(Boolean).join('');
      el.innerHTML=`
        <div><div class="food-name">${esc(f.name)}</div>
        <div class="food-macros">${mc||'<span>탄단지 미입력</span>'}</div></div>
        <div class="food-right">
          <div class="food-cal">${f.cal}<span>kcal</span></div>
          <button class="del-btn" onclick="deleteFood(event,${i})">×</button>
        </div>`;
      listEl.appendChild(el);
    });
  }
  renderWeightCard();
}

function setMacro(type,eaten,goal){
  document.getElementById(`${type}-eaten`).textContent=Math.round(eaten);
  document.getElementById(`${type}-goal`).textContent=goal;
  document.getElementById(`${type}-bar`).style.width=Math.min(100,Math.round(eaten/goal*100))+'%';
}

function deleteFood(e,idx){
  e.stopPropagation();
  const foods=getFoodLog(currentDate);
  foods.splice(idx,1);saveFoodLog(currentDate,foods);
  renderHome();showToast('삭제했어요');
}

// ── 음식 모달 ──────────────────────────────────
function openFoodModal(){
  document.getElementById('food-modal-overlay').classList.add('open');
  document.getElementById('food-search').value='';
  foodTabMode='frequent';
  switchFoodTab('frequent');
  // 새 음식 폼 닫기
  newFoodFormOpen=false;
  document.getElementById('new-food-fields').classList.remove('open');
  // 입력 초기화
  ['nf-name','nf-cal','nf-carb','nf-prot','nf-fat'].forEach(id=>document.getElementById(id).value='');
}
function closeFoodModal(){
  document.getElementById('food-modal-overlay').classList.remove('open');
}
function handleFoodModalOverlay(e){
  if(e.target===document.getElementById('food-modal-overlay'))closeFoodModal();
}

function switchFoodTab(tab){
  foodTabMode=tab;
  document.getElementById('tab-frequent').className='food-tab'+(tab==='frequent'?' active':'');
  document.getElementById('tab-recent').className='food-tab'+(tab==='recent'?' active':'');
  document.getElementById('food-tabs-bar').style.display='flex';
  document.getElementById('food-search').value='';
  renderFoodDBList();
}

function onFoodSearch(){
  const q=document.getElementById('food-search').value.trim();
  if(q){
    // 검색 중엔 탭 숨기기
    document.getElementById('food-tabs-bar').style.display='none';
    renderFoodDBList(q);
  } else {
    document.getElementById('food-tabs-bar').style.display='flex';
    renderFoodDBList();
  }
}

function renderFoodDBList(searchQ){
  const db=getFoodDB();
  const listEl=document.getElementById('food-db-list');

  if(!db.length){
    listEl.innerHTML=`<div class="food-db-empty"><div class="emoji">🥣</div><p>아직 등록된 음식이 없어요<br>아래 버튼으로 첫 음식을 추가해보세요!</p></div>`;
    return;
  }

  let items=[];
  if(searchQ){
    const q=searchQ.toLowerCase();
    items=db.filter(d=>d.name.toLowerCase().includes(q));
    if(!items.length){
      listEl.innerHTML=`<div class="food-db-empty"><div class="emoji">🔍</div><p>"${esc(searchQ)}" 검색 결과가 없어요<br>아래에서 새로 추가해보세요</p></div>`;
      return;
    }
  } else if(foodTabMode==='frequent'){
    items=db.slice().sort((a,b)=>(b.count||0)-(a.count||0));
  } else {
    items=db.slice().sort((a,b)=>(b.lastUsed||0)-(a.lastUsed||0));
  }

  listEl.innerHTML=items.map(m=>{
    const sub=[m.carb!=null?`탄 ${m.carb}g`:'',m.prot!=null?`단 ${m.prot}g`:'',m.fat!=null?`지 ${m.fat}g`:''].filter(Boolean).join(' · ');
    return `<div class="food-db-item">
      <div>
        <div class="food-db-name">${esc(m.name)}</div>
        ${sub?`<div class="food-db-sub">${sub}</div>`:''}
      </div>
      <div class="food-db-right">
        <div class="food-db-cal">${m.cal}kcal</div>
        <button class="food-db-add" onclick="addFromDB(${JSON.stringify(m.name)})">＋</button>
      </div>
    </div>`;
  }).join('');
}

function addFromDB(name){
  const db=getFoodDB();
  const item=db.find(d=>d.name===name);
  if(!item)return;
  const foods=getFoodLog(currentDate);
  foods.push({name:item.name,cal:item.cal,carb:item.carb,prot:item.prot,fat:item.fat});
  saveFoodLog(currentDate,foods);
  // 사용 횟수 & 최근 시간 업데이트
  item.count=(item.count||0)+1;
  item.lastUsed=Date.now();
  saveFoodDB(db);
  renderHome();
  renderFoodDBList(document.getElementById('food-search').value.trim()||undefined);
  showToast(`${name} 추가 완료!`);
}

function toggleNewFoodForm(){
  newFoodFormOpen=!newFoodFormOpen;
  const fields=document.getElementById('new-food-fields');
  if(newFoodFormOpen){fields.classList.add('open');document.getElementById('nf-name').focus();}
  else fields.classList.remove('open');
}

function addNewFood(){
  const name=document.getElementById('nf-name').value.trim();
  const cal=parseFloat(document.getElementById('nf-cal').value);
  const cv=document.getElementById('nf-carb').value;
  const pv=document.getElementById('nf-prot').value;
  const fv=document.getElementById('nf-fat').value;
  const carb=cv!==''?parseFloat(cv):null;
  const prot=pv!==''?parseFloat(pv):null;
  const fat=fv!==''?parseFloat(fv):null;
  if(!name){showToast('음식 이름을 입력해주세요');return;}
  if(isNaN(cal)||cal<0){showToast('칼로리를 입력해주세요');return;}

  // DB에 저장
  const db=getFoodDB();
  const ex=db.find(d=>d.name.toLowerCase()===name.toLowerCase());
  if(ex){
    Object.assign(ex,{cal:Math.round(cal),carb,prot,fat,count:(ex.count||0)+1,lastUsed:Date.now()});
  } else {
    db.push({name,cal:Math.round(cal),carb,prot,fat,count:1,lastUsed:Date.now()});
  }
  saveFoodDB(db);

  // 오늘 식단에도 추가
  const foods=getFoodLog(currentDate);
  foods.push({name,cal:Math.round(cal),carb,prot,fat});
  saveFoodLog(currentDate,foods);

  // 폼 초기화
  ['nf-name','nf-cal','nf-carb','nf-prot','nf-fat'].forEach(id=>document.getElementById(id).value='');
  renderHome();
  renderFoodDBList();
  showToast(`${name} 추가 완료!`);
}

// 체중
function renderWeightCard(){
  const log=getWeightLog();
  const cfg=getSettings();
  const sorted=log.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0];const prev=sorted[1];
  const goalW=cfg.goalWeight;
  document.getElementById('weight-goal-text').textContent=goalW?`목표: ${goalW}kg`:'목표: 미설정';
  if(latest){
    document.getElementById('weight-val').innerHTML=`${latest.val.toFixed(1)}<span>kg</span>`;
    if(prev){
      const d=(latest.val-prev.val).toFixed(1);
      const el=document.getElementById('weight-diff');
      if(d>0){el.textContent=`▲ ${d}kg`;el.style.color='var(--danger)';}
      else if(d<0){el.textContent=`▼ ${Math.abs(d)}kg`;el.style.color='var(--green)';}
      else{el.textContent='변화 없음';el.style.color='var(--muted)';}
    } else {document.getElementById('weight-diff').textContent='';}
  } else {
    document.getElementById('weight-val').innerHTML='--<span>kg</span>';
    document.getElementById('weight-diff').textContent='';
  }
  if(document.getElementById('weight-chart-section').classList.contains('open'))renderWeightChart();
}

function adjustWeight(delta){
  const log=getWeightLog();
  const today=todayStr();
  const sorted=log.slice().sort((a,b)=>b.date.localeCompare(a.date));
  const latest=sorted[0];
  let current=latest?latest.val:60;
  current=Math.round((current+delta)*10)/10;
  if(current<20||current>300)return;
  const idx=log.findIndex(e=>e.date===today);
  if(idx>=0)log[idx].val=current;
  else log.push({date:today,val:current});
  log.sort((a,b)=>a.date.localeCompare(b.date));
  saveWeightLog(log);
  renderWeightCard();
}

function toggleWeightChart(e){
  e.stopPropagation();
  const sec=document.getElementById('weight-chart-section');
  const btn=document.querySelector('.weight-chart-toggle');
  if(sec.classList.contains('open')){sec.classList.remove('open');btn.textContent='그래프 보기 ▾';}
  else{sec.classList.add('open');btn.textContent='그래프 닫기 ▴';renderWeightChart();}
}

function setPeriod(p){
  chartPeriod=p;
  document.getElementById('tab-week').className='period-tab'+(p==='week'?' active':'');
  document.getElementById('tab-month').className='period-tab'+(p==='month'?' active':'');
  renderWeightChart();
}

function renderWeightChart(){
  const all=getWeightLog();
  const today=new Date(todayStr()+'T00:00:00');
  const days=chartPeriod==='week'?7:30;
  const cutoff=new Date(today);cutoff.setDate(cutoff.getDate()-(days-1));
  const cs=`${cutoff.getFullYear()}-${pad(cutoff.getMonth()+1)}-${pad(cutoff.getDate())}`;
  drawChart(all.filter(e=>e.date>=cs));
  const logEl=document.getElementById('weight-log');
  const sorted=all.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,14);
  if(!sorted.length){logEl.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px;">아직 체중 기록이 없어요</div>';return;}
  logEl.innerHTML=sorted.map((e,i)=>{
    const prev=sorted[i+1];let diffHtml='';
    if(prev){const d=(e.val-prev.val).toFixed(1);if(d>0)diffHtml=`<span class="w-diff up">+${d}kg</span>`;else if(d<0)diffHtml=`<span class="w-diff down">${d}kg</span>`;}
    const dd=new Date(e.date+'T00:00:00');
    return `<div class="weight-entry"><div class="w-date">${dd.getMonth()+1}/${dd.getDate()}</div>
      <div class="w-right"><div class="w-val">${e.val}kg ${diffHtml}</div>
      <button class="w-del" onclick="deleteWeight('${e.date}')">×</button></div></div>`;
  }).join('');
}

function drawChart(data){
  const wrap=document.getElementById('weight-chart-wrap');
  if(data.length<2){wrap.innerHTML='<div class="empty-chart">데이터가 2개 이상 있어야 그래프가 표시돼요</div>';return;}
  const W=400,H=120,PX=30,PY=12;
  const vals=data.map(d=>d.val);
  const minV=Math.min(...vals)-0.5,maxV=Math.max(...vals)+0.5;
  const minT=new Date(data[0].date+'T00:00:00').getTime();
  const maxT=new Date(data[data.length-1].date+'T00:00:00').getTime();
  const tR=maxT-minT||1;
  const x=d=>PX+(new Date(d+'T00:00:00').getTime()-minT)/tR*(W-PX*2);
  const y=v=>PY+(1-(v-minV)/(maxV-minV))*(H-PY*2);
  const pts=data.map(d=>`${x(d.date).toFixed(1)},${y(d.val).toFixed(1)}`).join(' ');
  const fp=`${pts} ${x(data[data.length-1].date).toFixed(1)},${H} ${x(data[0].date).toFixed(1)},${H}`;
  const dots=data.map(d=>`<circle cx="${x(d.date).toFixed(1)}" cy="${y(d.val).toFixed(1)}" r="3.5" fill="#5b8dee" stroke="white" stroke-width="2"/>`).join('');
  const ylbls=[minV+0.5,(minV+maxV)/2,maxV-0.5].map(v=>`<text x="2" y="${y(v).toFixed(1)}" font-size="9.5" fill="#9e9a92" dominant-baseline="middle">${v.toFixed(1)}</text>`).join('');
  wrap.innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:120px;overflow:visible">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b8dee" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#5b8dee" stop-opacity=".02"/>
    </linearGradient></defs>
    ${ylbls}<polygon points="${fp}" fill="url(#cg)"/>
    <polyline points="${pts}" fill="none" stroke="#5b8dee" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}</svg>`;
}

function deleteWeight(date){
  saveWeightLog(getWeightLog().filter(e=>e.date!==date));
  renderWeightCard();showToast('삭제했어요');
}

// 설정
function renderSettingsPage(){
  const cfg=getSettings();
  document.getElementById('setting-cal').value=cfg.goalCal||2000;
  document.getElementById('setting-weight').value=cfg.goalWeight||'';
  updateMacroPreview();
}
function updateMacroPreview(){
  const cal=parseInt(document.getElementById('setting-cal').value)||2000;
  document.getElementById('prev-carb').textContent=Math.round(cal*0.50/4)+'g';
  document.getElementById('prev-prot').textContent=Math.round(cal*0.30/4)+'g';
  document.getElementById('prev-fat').textContent=Math.round(cal*0.20/9)+'g';
}
function saveSettings(){
  const cal=parseInt(document.getElementById('setting-cal').value);
  const wt=parseFloat(document.getElementById('setting-weight').value);
  if(isNaN(cal)||cal<500){showToast('올바른 칼로리를 입력해주세요');return;}
  ss('cfg',{goalCal:cal,goalWeight:isNaN(wt)?null:wt});
  renderHome();showToast('저장 완료! ✓');
}

function exportData(){
  const data={};
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{data[k]=JSON.parse(localStorage.getItem(k));}catch{data[k]=localStorage.getItem(k);}}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`식단다이어리_백업_${todayStr()}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast('백업 파일을 다운로드했어요 📤');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!confirm('기존 데이터를 백업 파일로 덮어쓸까요?\n현재 데이터는 사라져요.'))return;
      Object.entries(data).forEach(([k,v])=>ss(k,v));
      renderHome();showToast('데이터를 불러왔어요 ✓');
    }catch{showToast('파일 형식이 올바르지 않아요');}
    e.target.value='';
  };
  reader.readAsText(file);
}
function resetAllData(){
  if(!confirm('정말 모든 데이터를 삭제할까요?\n이 작업은 되돌릴 수 없어요.'))return;
  localStorage.clear();renderHome();showToast('모든 데이터를 초기화했어요');
}

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

renderHome();
</script>
